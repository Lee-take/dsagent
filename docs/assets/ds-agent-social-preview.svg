<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07131f" />
      <stop offset="0.55" stop-color="#0b253b" />
      <stop offset="1" stop-color="#0c3851" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#22c7ff" stop-opacity="0.30" />
      <stop offset="1" stop-color="#22c7ff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.06" />
    </linearGradient>
    <clipPath id="shotClip">
      <rect x="598" y="98" width="622" height="290" rx="16" />
    </clipPath>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#02070d" flood-opacity="0.48" />
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)" />
  <circle cx="1110" cy="42" r="310" fill="url(#glow)" />
  <circle cx="555" cy="660" r="340" fill="url(#glow)" opacity="0.34" />
  <path d="M0 526 C235 460 388 584 610 526 C832 468 1000 492 1280 410 L1280 640 L0 640 Z" fill="#052033" opacity="0.58" />

  <g transform="translate(64 58)">
    <rect width="176" height="34" rx="17" fill="#31c9ff" fill-opacity="0.13" stroke="#58d6ff" stroke-opacity="0.46" />
    <text x="88" y="22" text-anchor="middle" fill="#a8eaff" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="13" font-weight="700" letter-spacing="1.6">OPEN SOURCE · v1.0.0</text>

    <image x="0" y="72" width="90" height="90" xlink:href="../../apps/desktop/public/ds-agent-mark.png" />
    <text x="112" y="133" fill="#ffffff" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="62" font-weight="750" letter-spacing="-2">DS Agent</text>

    <text x="0" y="228" fill="#e9f7ff" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="30" font-weight="650">Put DeepSeek to work</text>
    <text x="0" y="266" fill="#e9f7ff" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="30" font-weight="650">on your Windows desktop.</text>

    <text x="0" y="322" fill="#9ec5da" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="18">Memory · Automation · Verified Computer Use</text>

    <g transform="translate(0 365)">
      <rect width="454" height="88" rx="16" fill="url(#panel)" stroke="#87dfff" stroke-opacity="0.18" />
      <circle cx="30" cy="29" r="5" fill="#52d3ff" />
      <text x="50" y="35" fill="#dff6ff" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17" font-weight="650">Permissioned local execution</text>
      <circle cx="30" cy="61" r="5" fill="#52d3ff" />
      <text x="50" y="67" fill="#dff6ff" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17" font-weight="650">Auditable evidence and recovery</text>
    </g>

    <text x="0" y="506" fill="#79a8bf" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15">Created and maintained by Lee take</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="584" y="84" width="650" height="318" rx="24" fill="#f7fbfd" stroke="#8bdfff" stroke-opacity="0.40" stroke-width="2" />
    <image x="598" y="98" width="622" height="290" preserveAspectRatio="xMidYMid slice" clip-path="url(#shotClip)" xlink:href="ds-agent-office-workflow.png" />
  </g>

  <g transform="translate(598 438)">
    <g>
      <rect width="184" height="74" rx="15" fill="url(#panel)" stroke="#8ddfff" stroke-opacity="0.20" />
      <text x="18" y="30" fill="#65dcff" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="13" font-weight="700">DEEPSEEK-FIRST</text>
      <text x="18" y="53" fill="#ffffff" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="650">Model-led reasoning</text>
    </g>
    <g transform="translate(200 0)">
      <rect width="184" height="74" rx="15" fill="url(#panel)" stroke="#8ddfff" stroke-opacity="0.20" />
      <text x="18" y="30" fill="#65dcff" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="13" font-weight="700">REVIEWABLE</text>
      <text x="18" y="53" fill="#ffffff" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="650">Visible run evidence</text>
    </g>
    <g transform="translate(400 0)">
      <rect width="222" height="74" rx="15" fill="url(#panel)" stroke="#8ddfff" stroke-opacity="0.20" />
      <text x="18" y="30" fill="#65dcff" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="13" font-weight="700">LOCAL CONTROL</text>
      <text x="18" y="53" fill="#ffffff" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="650">Permissions before action</text>
    </g>
  </g>

  <text x="598" y="562" fill="#9ec5da" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16">github.com/Lee-take/dsagent</text>
</svg>
