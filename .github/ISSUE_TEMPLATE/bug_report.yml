name: Bug report
description: Report a bug within the current v0.1-alpha scope.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve DeepSeek Agent OS. Please do not include secrets, API keys, private local paths, screenshots with sensitive data, mailbox content, or personal data. Use GitHub Private Vulnerability Reporting for security-sensitive reports.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest steps that reproduce the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - DeepSeek provider
        - Permission loop
        - Memory Studio
        - Operations Briefing
        - Local files/folders
        - NetworkSearch
        - Computer Use
        - Packaging/install
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11, macOS, Linux"
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification tried
      description: Commands, logs, or checks you ran. Redact sensitive values.
